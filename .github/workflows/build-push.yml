name: Build and push image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only authenticate when we intend to push (merge to main).
      # On PR commits the build runs unauthenticated — sufficient for acceptance testing.
      - name: Log in to ghcr.io
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/jarvis-executive-summary:latest
            ghcr.io/${{ github.repository_owner }}/jarvis-executive-summary:${{ github.sha }}
          # GHA layer cache — mode=max exports all intermediate layers so the
          # pip-install layer survives across PR commits (invalidated only when
          # pyproject.toml changes, not on source-only edits).
          cache-from: type=gha
          cache-to: type=gha,mode=max
